{% extends 'base.html' %}
{% block content %}
<h2>Add New Task</h2>
<form action="/add" method="post" id="add-task-form">
    <label>Title</label>
    <input type="text" name="title" id="title" placeholder="Task title" required>
    <label>Description</label>
    <textarea name="description" id="description" rows="4" placeholder="Task description"></textarea>
    <button type="submit" class="btn btn-primary" id="submit-btn">Add Task</button>
</form>
{% endblock %}
