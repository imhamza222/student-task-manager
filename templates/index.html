{% extends 'base.html' %}
{% block content %}
<form action="/search" method="get" style="margin: 15px 0;">
    <input type="text" name="q" placeholder="Search tasks..." value="{{ query|default('') }}" id="search-input" style="width:70%; display:inline-block;">
    <button type="submit" class="btn btn-primary" id="search-btn">Search</button>
</form>

{% if tasks %}
<table id="tasks-table">
    <tr><th>ID</th><th>Title</th><th>Description</th><th>Status</th><th>Actions</th></tr>
    {% for task in tasks %}
    <tr class="task-row">
        <td>{{ task.id }}</td>
        <td class="task-title">{{ task.title }}</td>
        <td>{{ task.description }}</td>
        <td><span class="badge-{{ task.status }}">{{ task.status }}</span></td>
        <td>
            <a href="/edit/{{ task.id }}" class="btn btn-warning edit-btn">Edit</a>
            <a href="/delete/{{ task.id }}" class="btn btn-danger delete-btn" onclick="return confirm('Delete?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p id="no-tasks">No tasks found.</p>
{% endif %}
{% endblock %}
